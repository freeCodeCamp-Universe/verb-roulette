<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verb Roulette</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="verb-roulette.css" />
</head>
<body>

<h1>Verb Roulette</h1>
<p class="subtitle">spin · memorise · type all 3 forms</p>

<div class="stats">
  <div class="stat">
    <div class="stat-val" id="sScore">0</div>
    <div class="stat-lbl">Score</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="sStreak">0</div>
    <div class="stat-lbl">Streak</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="sRound">0</div>
    <div class="stat-lbl">Round</div>
  </div>
</div>

<div class="wheel-area">
  <div class="wheel-wrapper">
    <div class="pointer"></div>
    <svg id="wheel-svg" viewBox="0 0 300 300" width="300" height="300">
      <g id="wheel-group"></g>
    </svg>
  </div>
  <div class="time-picker" id="timePicker">
    <button class="time-opt active" data-val="10">10s</button>
    <button class="time-opt"        data-val="30">30s</button>
    <button class="time-opt"        data-val="60">60s</button>
    <button class="time-opt"        data-val="0">∞</button>
  </div>
  <div id="langPicker">
    <div class="time-picker">
      <span class="lang-group-label">germanic:</span>
      <button class="time-opt active" data-lang="en">🇺🇸 EN</button>
      <button class="time-opt"        data-lang="de">🇩🇪 DE</button>
      <button class="time-opt"        data-lang="nl">🇳🇱 NL</button>
      <button class="time-opt"        data-lang="sv">🇸🇪 SV</button>
      <button class="time-opt"        data-lang="da">🇩🇰 DA</button>
      <button class="time-opt"        data-lang="is">🇮🇸 IS</button>
      <button class="time-opt"        data-lang="no">🇳🇴 NO</button>
    </div>
    <div class="time-picker">
      <span class="lang-group-label">romance:</span>
      <button class="time-opt" data-lang="fr">🇫🇷 FR</button>
      <button class="time-opt" data-lang="es">🇪🇸 ES</button>
      <button class="time-opt" data-lang="pt">🇧🇷 PT</button>
      <button class="time-opt" data-lang="it">🇮🇹 IT</button>
    </div>
  </div>
  <button class="btn-spin" id="spinBtn">SPIN</button>
</div>

<div class="btn-group">
  <button class="btn-theory" id="theoryBtn">Grammar Reference</button>
  <button class="btn-theory" id="verbListBtn">Verb List</button>
</div>

<div id="verblist-modal">
  <div class="theory-box verblist-box">
    <div class="theory-header">
      <span class="theory-header-title" id="verbListTitle">Verb List</span>
      <button class="theory-close" id="verbListClose" aria-label="Close">✕</button>
    </div>
    <div class="verblist-scroll">
      <table class="verblist-table" id="verbListTable"></table>
      <p class="verblist-footnote" id="verbListFootnote"></p>
    </div>
  </div>
</div>

<div id="theory-modal">
  <div class="theory-box">
    <div class="theory-header">
      <span class="theory-header-title">Grammar Reference</span>
      <button class="theory-close" id="theoryClose" aria-label="Close">✕</button>
    </div>
    <div class="theory-grid" id="theoryGrid"></div>
  </div>
</div>

<div id="challenge">
  <div class="challenge-box">
    <button class="challenge-close" id="challengeClose" aria-label="Close">✕</button>
    <div id="verb-reveal">—</div>
    <div id="verb-translation"></div>

    <div class="timer-row" id="timerRow">
      <div class="timer-track">
        <div id="timer-bar"></div>
      </div>
      <div id="timer-count">10</div>
    </div>

    <div class="input-row">
      <div class="input-group">
        <label id="lbl-inf">Infinitive</label>
        <input class="verb-input" id="inf-input"  type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="…" />
      </div>
      <div class="arrow-sep">→</div>
      <div class="input-group">
        <label id="lbl-past">Past Simple</label>
        <input class="verb-input" id="past-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="…" />
      </div>
      <div class="arrow-sep">→</div>
      <div class="input-group">
        <label id="lbl-pp">Past Participle</label>
        <input class="verb-input" id="pp-input"   type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="…" />
      </div>
    </div>

    <div id="answer-line">
      <span id="ans-inf"></span>
      <span class="sep">→</span>
      <span id="ans-past"></span>
      <span class="sep">→</span>
      <span id="ans-pp"></span>
    </div>

    <button class="btn-check" id="checkBtn">CHECK</button>
    <div id="score-popup"></div>
    <button class="btn-next" id="nextBtn" style="display:none">SPIN AGAIN →</button>
  </div>
</div>

<script src="verbs-en.js"></script>
<script src="verbs-de.js"></script>
<script src="verbs-nl.js"></script>
<script src="verbs-sv.js"></script>
<script src="verbs-da.js"></script>
<script src="verbs-is.js"></script>
<script src="verbs-no.js"></script>
<script src="verbs-pt.js"></script>
<script src="verbs-fr.js"></script>
<script src="verbs-it.js"></script>
<script src="verbs-es.js"></script>
<script src="verb-roulette.js"></script>
</body>
</html>
